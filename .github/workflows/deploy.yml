name: Build website from source

on:
  push:
    branches:
      - main
    paths:
      - "lab_page/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-website
  cancel-in-progress: false

jobs:
  build:
    name: Build and publish static files
    if: ${{ !contains(github.event.head_commit.message, '[skip deploy]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lab_page/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: lab_page

      - name: Build site
        run: npm run build
        working-directory: lab_page

      - name: Copy generated files to repository root
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.nojekyll' \
            --exclude='README.md' \
            --exclude='lab_page' \
            --exclude='node_modules' \
            lab_page/public/ ./
          touch .nojekyll

      - name: Commit generated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated site changes to commit."
          else
            git commit -m "Site updated from Hexo source [skip deploy]"
            git push
          fi
